<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anansak's Portfolio</title>
  
  <!-- นำเข้าฟอนต์ Google Fonts เพื่อความโมเดิร์น -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      /* ปรับพื้นหลังให้เป็นแนวหรูหรา อบอุ่น ผสมผสานสีม่วงและชมพูพาสเทล */
      background: linear-gradient(135deg, #f5f7fa 0%, #e8ddfc 100%);
      font-family: 'Noto Sans Thai', sans-serif;
      color: #2d3748;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .portfolio-card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 24px;
      padding: 40px 30px;
      box-shadow: 0 20px 40px rgba(155, 89, 182, 0.12);
      max-width: 440px;
      width: 100%;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.6);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    /* เอฟเฟกต์ยกตัวเมื่อเมาส์มาชี้ */
    .portfolio-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 30px 60px rgba(155, 89, 182, 0.2);
    }

    /* โซนรูปถ่ายโปรไฟล์ */
    .profile-img-container {
      position: relative;
      width: 130px;
      height: 130px;
      margin: 0 auto 20px auto;
    }

    .profile-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      border: 4px solid #fff;
      box-shadow: 0 8px 20px rgba(155, 89, 182, 0.2);
      transition: transform 0.4s ease;
    }

    .portfolio-card:hover .profile-img {
      transform: scale(1.05) rotate(2deg);
    }

    /* ข้อความต้อนรับ */
    h1 {
      font-size: 1.45rem;
      font-weight: 700;
      color: #3b1e4d;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    /* ข้อมูลส่วนตัว */
    .profile-info {
      background: rgba(255, 255, 255, 0.7);
      padding: 18px;
      border-radius: 16px;
      margin-bottom: 25px;
      border: 1px solid rgba(155, 89, 182, 0.08);
    }

    .profile-info p {
      font-size: 1rem;
      margin: 8px 0;
      color: #4a5568;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px dashed rgba(0, 0, 0, 0.05);
      padding-bottom: 8px;
    }

    .profile-info p:last-child {
      border-bottom: none;
      padding-bottom: 0;
      margin-bottom: 0;
    }

    .profile-info strong {
      color: #8e44ad;
      font-weight: 600;
    }

    .info-value {
      font-weight: 400;
      color: #2d3748;
    }

    hr {
      border: 0;
      height: 1px;
      background: linear-gradient(to right, transparent, #e2d1f0, transparent);
      margin: 25px 0;
    }

    h3 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #6c4482;
      margin-bottom: 15px;
      letter-spacing: 0.5px;
    }

    /* ช่องทางการติดต่อดีไซน์ใหม่เป็นปุ่มสไตล์โมเดิร์น */
    .contact-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .contact-item {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
      border-radius: 12px;
      background: #fff;
      text-decoration: none;
      color: #4a5568;
      font-size: 0.95rem;
      font-weight: 500;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.02);
      border: 1px solid rgba(0, 0, 0, 0.03);
      transition: all 0.3s ease;
    }

    /* ปรับแต่งปุ่มอีเมลตอน Hover */
    .contact-item.email-btn:hover {
      background: #8e44ad;
      color: #fff;
      transform: scale(1.02);
      box-shadow: 0 5px 15px rgba(142, 68, 173, 0.3);
    }

    /* ปรับแต่งปุ่มไลน์ตอน Hover */
    .contact-item.line-btn:hover {
      background: #06C755;
      color: #fff;
      transform: scale(1.02);
      box-shadow: 0 5px 15px rgba(6, 199, 85, 0.3);
    }

    .contact-label {
      font-weight: 600;
      margin-right: 6px;
    }
  </style>
</head>
<body>

  <div class="portfolio-card">
    <!-- ใส่ Container ให้รูปภาพเพื่อทำ Effect -->
    <div class="profile-img-container">
      <img class="profile-img" src="https://www.lannapoly.ac.th/online/Stu_picture/67219010075.jpg" alt="อนันต์ศักดิ์ เอี่ยมอาร่าม">
    </div>

    <h1>สวัสดีครับ ยินดีต้อนรับเข้าสู่<br>พอร์ตโฟลิโอของผม</h1>
    
    <div class="profile-info">
      <p><strong>ชื่อ-นามสกุล</strong> <span class="info-value">อนันต์ศักดิ์ เอี่ยมอาร่าม</span></p>
      <p><strong>ตำแหน่ง</strong> <span class="info-value">นักศึกษาสาขาเทคโนโลยีสารสนเทศ</span></p>
    </div>

    <hr>
    
    <h3>ช่องทางการติดต่อ</h3>
    <div class="contact-list">
      <!-- ปรับให้ช่องทางการติดต่อเป็นคลิกเพื่อแอกชันได้สะดวกขึ้น -->
      <a href="mailto:tea10492@lannapoly.ac.th" class="contact-item email-btn">
        <span class="contact-label">Email:</span> jony123y3112@gmail.com
      </a>
      <a href="https://line.me/ti/p/~myline123" target="_blank" class="contact-item line-btn">
        <span class="contact-label">Line ID:</span> Kunlasatri
      </a>
    </div>
  </div>

</body>
</html>
